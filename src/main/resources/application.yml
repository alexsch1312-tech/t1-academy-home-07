spring:
  flyway:
    enabled: true
    clean-disabled: false
    validate-migration-naming: false
    baseline-on-migrate: true
  datasource:
    url: jdbc:postgresql://localhost:5432/postgres
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10

  jpa:
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
      # format_sql: true
    open-in-view: false
    hibernate:
      # create-drop автоматически создаст таблицы по Entity и удалит их при выключении
      ddl-auto: validate